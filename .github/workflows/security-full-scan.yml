name: Security Full Scan (Nightly)

on:
  schedule:
    # Mon-Fri at 01:00 UTC
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RESOURCE_GROUP: bgt-security-scan-${{ github.run_id }}
  AZURE_LOCATION: westeurope

jobs:
  full-scan:
    name: Full Active Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      security-events: write
      actions: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:security-scan-${{ github.run_id }}
          cache-from: type=gha
          build-args: |
            VERSION=0.0.0-security

      - name: Generate ephemeral secrets
        id: secrets
        run: |
          DB_PASSWORD=$(openssl rand -base64 32)
          JWT_SECRET=$(openssl rand -base64 64)
          echo "::add-mask::$DB_PASSWORD"
          echo "::add-mask::$JWT_SECRET"
          echo "db_password=$DB_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "jwt_secret=$JWT_SECRET" >> "$GITHUB_OUTPUT"

      - name: Azure OIDC Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location "${{ env.AZURE_LOCATION }}" \
            --tags purpose=security-scan run_id=${{ github.run_id }}

      - name: Deploy Bicep template
        id: deploy
        run: |
          RESULT=$(az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/security-scan.bicep \
            --parameters \
              imageName="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
              dbPassword="${{ steps.secrets.outputs.db_password }}" \
              jwtSecret="${{ steps.secrets.outputs.jwt_secret }}" \
            --query "properties.outputs" \
            --output json)

          APP_URL=$(echo "$RESULT" | jq -r '.appUrl.value')
          echo "::add-mask::$APP_URL"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"
          echo "Application URL: $APP_URL"

      - name: Wait for application to become healthy
        run: |
          APP_URL="${{ steps.deploy.outputs.app_url }}"
          echo "Polling $APP_URL/api/settings ..."

          for i in $(seq 1 120); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$APP_URL/api/settings" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Application is healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "::error::Application did not become healthy within 120s (last HTTP $HTTP_CODE)"
              exit 1
            fi
            sleep 1
          done

      - name: Authenticate and extract JWT
        id: auth
        env:
          ZAP_TEST_USERNAME: ${{ secrets.ZAP_TEST_USERNAME }}
          ZAP_TEST_PASSWORD: ${{ secrets.ZAP_TEST_PASSWORD }}
        run: |
          APP_URL="${{ steps.deploy.outputs.app_url }}"

          RESPONSE=$(curl -sf -X POST "$APP_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${{ env.ZAP_TEST_USERNAME }}\", \"password\": \"${{ env.ZAP_TEST_PASSWORD }}\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.accessToken')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to extract JWT from login response"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "Authentication successful"

      - name: Run ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: ${{ steps.deploy.outputs.app_url }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          allow_issue_writing: false
          cmd_options: >-
            -z "-config replacer.full_list(0).description=AuthHeader
            -config replacer.full_list(0).enabled=true
            -config replacer.full_list(0).matchtype=REQ_HEADER
            -config replacer.full_list(0).matchstr=Authorization
            -config replacer.full_list(0).regex=false
            -config replacer.full_list(0).replacement=Bearer\ ${{ steps.auth.outputs.token }}
            -config replacer.full_list(0).initiators="
          rules_file_name: ".zap/rules.tsv"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: report_sarif.json
          category: zap-full-scan

      - name: Upload scan reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-full-scan-reports-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
            report_md.md
            report_sarif.json
          retention-days: 90

      - name: Delete Azure resource group
        if: always()
        run: |
          az group delete \
            --name "${{ env.RESOURCE_GROUP }}" \
            --yes \
            --no-wait
          echo "Resource group deletion initiated (async)"
