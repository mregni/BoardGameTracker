name: Deploy

on:
  push:
    branches:
      - dev
      - master
    paths-ignore:
      - "docs/**"
      - ".github/workflows/docs.yml"

env:
  REGISTRY: ${{ vars.DOCKER_REGISTRY || 'docker.io' }}
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'uping/boardgametracker' }}

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.versioning.outputs.version }}
      is_master: ${{ github.ref == 'refs/heads/master' }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Git Semantic Version
        uses: PaulHatch/semantic-version@v6.0.2
        id: versioning
        with:
          enable_prerelease_mode: ${{ github.ref == 'refs/heads/dev' }}
          namespace: beta
          bump_each_commit: true
          version_format: "${{ github.ref == 'refs/heads/dev' && '${major}.${minor}.${patch}-beta' || '${major}.${minor}.${patch}' }}"
          debug: true

  test-and-analyze:
    name: Test and SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup dotnet v8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.x"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: 'npm'
          cache-dependency-path: boardgametracker.client/package-lock.json

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Install .NET dependencies
        run: dotnet restore ./BoardGameTracker.sln

      - name: Begin SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /v:"${{ needs.version.outputs.version }}" \
            /d:sonar.cs.opencover.reportsPaths="TestResults/**/coverage.opencover.xml" \
            /d:sonar.cs.vstest.reportsPaths="TestResults/*.trx" \
            /d:sonar.javascript.lcov.reportPaths="boardgametracker.client/coverage/lcov.info" \
            /d:sonar.exclusions="**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/TestResults/**,**/obj/**,**/bin/**" \
            /d:sonar.coverage.exclusions="**/BoardGameTracker.Host/**/*.cs,**/BoardGameTracker.Core/Datastore/**/*.cs,**/ViewModels/**/*.cs,**/Entities/**/*.cs,**/routeTree.gen.ts,**/tailwind.config.js,**/node_modules/**" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.qualitygate.timeout=300
        if: env.SONAR_TOKEN != ''

      - name: Build .NET
        run: dotnet build --no-restore

      - name: Run .NET tests
        run: |
          dotnet test ./BoardGameTracker.Tests/BoardGameTracker.Tests.csproj \
            --no-build \
            --no-restore \
            --logger trx \
            --results-directory "TestResults" \
            --collect "XPlat Code Coverage;Format=opencover" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/BoardGameTracker.Host/**/*.cs,**/DataStore/**/*.cs,**/ViewModels/**/*.cs,**/Entities/**/*.cs"

      - name: Install frontend dependencies
        run: |
          cd boardgametracker.client
          npm ci

      - name: Run Biome format check
        run: |
          cd boardgametracker.client
          npm run format:check

      - name: Run Biome lint
        run: |
          cd boardgametracker.client
          npm run lint

      - name: Run frontend tests with coverage
        run: |
          cd boardgametracker.client
          npm run test:coverage

      - name: End SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        if: env.SONAR_TOKEN != ''

      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            TestResults
            boardgametracker.client/coverage
          retention-days: 7
        if: success() || failure()

      - name: Code Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5.5.4
        with:
          reports: "TestResults/**/coverage.opencover.xml;boardgametracker.client/coverage/lcov.info"
          targetdir: "coveragereport"
          reporttypes: "MarkdownSummaryGithub;Cobertura"
          sourcedirs: "boardgametracker.client"
          assemblyfilters: "-BoardGameTracker.Host;-BoardGameTracker.DataStore"
          filefilters: "-**/ViewModels/**;-**/Entities/**"

      - name: Publish Coverage Summary
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

  build-linux-multiarch:
    needs: [version, test-and-analyze]
    name: Build Multi-Arch Linux Containers
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update package.json version
        run: |
          cd boardgametracker.client
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker (dev)
        id: meta-dev
        if: github.ref == 'refs/heads/dev'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=dev

      - name: Extract metadata for Docker (master)
        id: meta-master
        if: github.ref == 'refs/heads/master'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.version.outputs.version }}
            type=raw,value=latest

      - name: Build and Push Multi-Architecture Images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ github.ref == 'refs/heads/master' && steps.meta-master.outputs.tags || steps.meta-dev.outputs.tags }}
          labels: ${{ github.ref == 'refs/heads/master' && steps.meta-master.outputs.labels || steps.meta-dev.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            ASPNETCORE_ENVIRONMENT=production
            BUILDKIT_INLINE_CACHE=1
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}

  security-scan:
    needs: [version, test-and-analyze]
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha
          build-args: |
            VERSION=${{ needs.version.outputs.version }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy vulnerability scanner (fail on critical)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          timeout: '10m'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ needs.version.outputs.version }}
          path: sbom.json
          retention-days: 90

  create-github-release:
    name: Create GitHub Release
    needs: [version, build-linux-multiarch]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        run: |
          VERSION=${{ needs.version.outputs.version }}

          # Get previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate changelog
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          cat > release_notes.md << EOF
          ## BoardGameTracker v${VERSION}

          ### Docker Images

          **Multi-Architecture Linux:**
          \`\`\`bash
          docker pull uping/boardgametracker:${VERSION}
          docker pull uping/boardgametracker:latest
          \`\`\`

          Supported platforms:
          - \`linux/amd64\` - x86_64 architecture
          - \`linux/arm64\` - ARM 64-bit (Raspberry Pi 4, AWS Graviton)

          ### Changes

          ${CHANGELOG}

          ### Upgrade Notes

          If updating from a previous version:
          1. Pull the new image: \`docker pull uping/boardgametracker:${VERSION}\`
          2. Stop and remove the old container
          3. Start with the new image (database migrations run automatically)

          ### Documentation

          - [Main Repository](https://github.com/mregni/BoardGameTracker)
          - [Docker Hub](https://hub.docker.com/r/uping/boardgametracker)
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-completion:
    name: Build Summary
    needs: [version, build-linux-multiarch]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Build Summary
        run: |
          VERSION=${{ needs.version.outputs.version }}
          BRANCH=${{ github.ref_name }}

          if [ "$BRANCH" = "master" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          # Release v${VERSION} Published

          ## Docker Images
          - \`uping/boardgametracker:${VERSION}\`
          - \`uping/boardgametracker:latest\`

          **Platforms:** linux/amd64, linux/arm64

          ## Links
          - [Docker Hub](https://hub.docker.com/r/uping/boardgametracker)
          - [Release Notes](https://github.com/${{ github.repository }}/releases/tag/v${VERSION})
          EOF
          else
            cat >> $GITHUB_STEP_SUMMARY << EOF
          # Dev Build ${VERSION} Published

          ## Docker Images
          - \`uping/boardgametracker:${VERSION}\`
          - \`uping/boardgametracker:dev\`

          **Platforms:** linux/amd64, linux/arm64
          EOF
          fi
